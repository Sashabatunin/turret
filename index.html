<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pan-Tilt AI Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: system-ui, sans-serif; touch-action: none; }
    #canvas { width: 100vw; height: 100vh; display: block; }
    #ui { position: fixed; top: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #0f0; 
          padding: 10px; border-radius: 10px; z-index: 100; font-size: 13px; backdrop-filter: blur(6px); 
          border: 1px solid rgba(0,255,0,0.3); max-height: 40vh; overflow-y: auto; transition: opacity 0.3s; }
    #ui.collapsed { opacity: 0.2; pointer-events: none; }
    #ui.collapsed:hover { opacity: 1; pointer-events: auto; }
    .row { display: flex; gap: 5px; margin-bottom: 6px; flex-wrap: wrap; }
    .row input { flex: 1; min-width: 100px; background: rgba(30,30,30,0.8); color: #0f0; border: 1px solid #444; 
                 padding: 6px 8px; border-radius: 5px; font-size: 12px; outline: none; }
    .row input:focus { border-color: #0f0; }
    button { background: #004400; color: #fff; border: none; padding: 8px 12px; border-radius: 5px; 
             font-weight: bold; cursor: pointer; font-size: 13px; margin: 2px 0; }
    button:active { background: #002200; }
    button.secondary { background: #333; }
    button.danger { background: #550000; }
    #status { margin-top: 6px; font-size: 12px; padding: 5px; background: rgba(0,0,0,0.4); border-radius: 4px; text-align: center; }
    #log { max-height: 80px; overflow-y: auto; font-size: 10px; color: #999; margin-top: 6px; font-family: monospace; line-height: 1.3; }
    .log-item { margin: 1px 0; }
    .log-err { color: #f55; } .log-warn { color: #fa0; } .log-ok { color: #8f8; }
    #controls { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 8px; 
                border-radius: 8px; border: 1px solid rgba(0,255,0,0.3); z-index: 90; display: flex; flex-direction: column; gap: 5px; }
    #stats { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #0f0; padding: 6px 10px; 
             border-radius: 6px; font-size: 11px; font-family: monospace; z-index: 90; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <video id="vid" style="display:none" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  
  <div id="controls">
    <button onclick="toggleMirror()">🪞 Зеркало: <span id="mirrorState">OFF</span></button>
    <button onclick="toggleUI()">👁 Меню</button>
    <button class="secondary" onclick="resetServos()">🔄 Центр</button>
  </div>
  
  <div id="ui">
    <h3 style="margin-bottom: 8px; color: #0f0; font-size: 14px;">🎯 Pan-Tilt Tracker</h3>
    <div class="row"><input id="mqttHost" placeholder="Host" value="367d7905056a451cac7755db6f5bcc81.s1.eu.hivemq.cloud"></div>
    <div class="row">
      <input id="mqttPort" placeholder="Port" value="8884" type="number" style="max-width: 70px;">
      <input id="mqttUser" placeholder="User" value="">
    </div>
    <div class="row">
      <input id="mqttPass" type="password" placeholder="Pass" value="">
      <input id="mqttTopic" placeholder="Topic" value="servo/control">
    </div>
    <button id="btnStart" onclick="init()">🚀 СТАРТ</button>
    <button id="btnStop" class="hidden danger" onclick="stop()">⏹ СТОП</button>
    <div id="status">📴 Готов</div>
    <div id="log"></div>
  </div>

  <div id="stats" class="hidden">FPS:<span id="fps">0</span> | Obj:<span id="objCount">0</span> | Sent:<span id="sentCount">0</span></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

  <script>
    // ================= ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =================
    let detector, mqtt, vid, ctx, canvas;
    let tracking = false;
    let lastSend = 0, frameCount = 0, lastFpsTime = 0, sentCount = 0;
    let isMirrored = false, uiCollapsed = false;
    let connectOptions = {}; // Храним опции для авто-реконнекта
    
    const SEND_INTERVAL = 100;
    const CONF_THRESHOLD = 0.35;
    const CANVAS_WIDTH = 320;
    const CANVAS_HEIGHT = 240;

    const ui = {
      status: document.getElementById('status'), log: document.getElementById('log'),
      btnStart: document.getElementById('btnStart'), btnStop: document.getElementById('btnStop'),
      stats: document.getElementById('stats'), fps: document.getElementById('fps'),
      objCount: document.getElementById('objCount'), sentCount: document.getElementById('sentCount'),
      mirrorState: document.getElementById('mirrorState')
    };

    // ================= ЛОГИРОВАНИЕ =================
    function log(msg, type = 'info') {
      const time = new Date().toLocaleTimeString();
      const cls = type === 'err' ? 'log-err' : type === 'warn' ? 'log-warn' : 'log-ok';
      const div = document.createElement('div');
      div.className = `log-item ${cls}`; div.textContent = `[${time}] ${msg}`;
      ui.log.insertBefore(div, ui.log.firstChild);
      while (ui.log.children.length > 15) ui.log.removeChild(ui.log.lastChild);
      console.log(`[${type.toUpperCase()}] ${msg}`);
    }
    function updateStatus(msg) { ui.status.textContent = msg; }

    // ================= УПРАВЛЕНИЕ UI =================
    function toggleMirror() {
      isMirrored = !isMirrored;
      canvas.style.transform = isMirrored ? 'scaleX(-1)' : 'scaleX(1)';
      ui.mirrorState.textContent = isMirrored ? 'ON' : 'OFF';
      ui.mirrorState.style.color = isMirrored ? '#0f0' : '#888';
    }
    function toggleUI() {
      uiCollapsed = !uiCollapsed;
      document.getElementById('ui').classList.toggle('collapsed', uiCollapsed);
    }
    function resetServos() {
      if (mqtt?.isConnected()) {
        const msg = new Paho.MQTT.Message(JSON.stringify({ ex: 0, ey: 0, conf: 1.0, cmd: 'center' }));
        msg.destinationName = document.getElementById('mqttTopic').value.trim() || 'servo/control';
        mqtt.send(msg);
        log('🔄 Отправлена команда: центр', 'ok');
      }
    }

    // ================= ПРЕДУПРЕЖДЕНИЕ О ФОНОВОЙ ВКЛАДКЕ =================
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && tracking) {
        log('⚠️ Вкладка ушла в фон — MQTT может отключиться!', 'warn');
        updateStatus('⚠️ Не сворачивайте браузер!');
      } else if (!document.hidden && tracking) {
        log('✅ Вкладка активна', 'ok');
        if (mqtt && !mqtt.isConnected()) {
          log('🔄 Восстанавливаю MQTT...', 'info');
          mqtt.connect(connectOptions);
        }
      }
    });

    // ================= ИНИЦИАЛИЗАЦИЯ =================
    async function init() {
      try {
        ui.btnStart.classList.add('hidden'); ui.btnStop.classList.remove('hidden'); ui.stats.classList.remove('hidden');
        updateStatus('📷 Камера...');
        vid = document.getElementById('vid'); canvas = document.getElementById('canvas'); ctx = canvas.getContext('2d');
        
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'environment', width: { ideal: 320 }, height: { ideal: 240 } }, audio: false 
        });
        vid.srcObject = stream;
        await new Promise(resolve => { vid.onloadedmetadata = () => { vid.play(); resolve(); }; });
        canvas.width = CANVAS_WIDTH; canvas.height = CANVAS_HEIGHT;
        log('✅ Камера OK', 'ok');
        updateStatus('🔌 MQTT...');

        const host = document.getElementById('mqttHost').value.trim();
        const port = parseInt(document.getElementById('mqttPort').value) || 8884;
        const user = document.getElementById('mqttUser').value.trim();
        const pass = document.getElementById('mqttPass').value.trim();
        const topic = document.getElementById('mqttTopic').value.trim() || 'servo/control';
        if (!host) throw new Error('Укажите MQTT Host');
        
        const clientId = `web_pt_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        mqtt = new Paho.MQTT.Client(host, port, `/mqtt`, clientId);

        // ✅ РЕШЕНИЕ 1: Keep-Alive, cleanSession, авто-реконнект
        connectOptions = {
          timeout: 30,
          keepAliveInterval: 30,          // Пинг каждые 30 сек (критично для стабильности)
          cleanSession: true,             // Новая сессия при каждом подключении
          useSSL: location.protocol === 'https:',
          mqttVersion: 4,                 // MQTT 3.1.1
          onSuccess: () => {
            log('✅ MQTT подключен', 'ok');
            updateStatus('⏳ AI...');
            mqtt.subscribe(topic);
            loadAI();
          },
          onFailure: (res) => {
            log(`❌ MQTT ошибка: ${res.errorMessage} (code: ${res.errorCode})`, 'err');
            updateStatus('❌ MQTT Failed');
            setTimeout(() => { if (!mqtt.isConnected()) mqtt.connect(connectOptions); }, 3000);
          }
        };
        if (user) { connectOptions.userName = user; connectOptions.password = pass; }

        mqtt.onConnectionLost = (res) => {
          log(`🔴 MQTT отключен: ${res.errorMessage} (code: ${res.errorCode})`, 'err');
          updateStatus(`🔴 Lost: ${res.errorMessage}`);
          // Авто-реконнект для стандартных кодов обрыва
          if ([0, 1, 3, 6, 7].includes(res.errorCode)) {
            setTimeout(() => { if (!mqtt.isConnected()) mqtt.connect(connectOptions); }, 3000);
          }
        };
        
        mqtt.connect(connectOptions);
      } catch (e) { 
        log(`❌ ${e.message}`, 'err'); updateStatus(`❌ ${e.message}`); 
        ui.btnStart.classList.remove('hidden'); ui.btnStop.classList.add('hidden'); 
      }
    }

    // ================= ЗАГРУЗКА AI =================
    async function loadAI() {
      try {
        updateStatus('⏳ Загрузка AI (10-20 сек)...');
        detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
        log('✅ AI готов!', 'ok');
        updateStatus('🟢 ТРЕКИНГ АКТИВЕН');
        tracking = true; lastFpsTime = performance.now(); loop();
      } catch (e) { log(`❌ AI: ${e.message}`, 'err'); updateStatus('❌ AI Failed'); }
    }

    // ================= ОСНОВНОЙ ЦИКЛ =================
    async function loop() {
      if (!tracking) return;
      requestAnimationFrame(loop); frameCount++;
      const now = performance.now();
      if (now - lastFpsTime >= 1000) { ui.fps.textContent = frameCount; frameCount = 0; lastFpsTime = now; }
      
      ctx.drawImage(vid, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      try {
        const preds = await detector.detect(canvas);
        const valid = preds.filter(p => p.score >= CONF_THRESHOLD);
        ui.objCount.textContent = valid.length;
        if (valid.length === 0) { drawCrosshair('#f00'); return; }
        
        const obj = valid[0];
        const [x, y, w, h] = obj.bbox;
        let cx = x + w/2, cy = y + h/2;
        if (isMirrored) cx = CANVAS_WIDTH - cx; // Компенсация зеркала
        
        const ex = cx - CANVAS_WIDTH/2, ey = cy - CANVAS_HEIGHT/2;
        ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
        ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2); ctx.fillStyle = '#0f0'; ctx.fill();
        drawCrosshair('#0f0');
        ctx.fillStyle = '#0f0'; ctx.font = 'bold 11px monospace';
        ctx.fillText(`${obj.class} ${Math.round(obj.score*100)}%`, x, y-8);
        
        if (now - lastSend >= SEND_INTERVAL && mqtt?.isConnected()) {
          const payload = JSON.stringify({ ex: Math.round(ex), ey: Math.round(ey), conf: parseFloat(obj.score.toFixed(3)), class: obj.class });
          const msg = new Paho.MQTT.Message(payload);
          msg.destinationName = document.getElementById('mqttTopic').value.trim() || 'servo/control';
          mqtt.send(msg); sentCount++; ui.sentCount.textContent = sentCount; lastSend = now;
        }
      } catch (e) { console.error(e); }
    }

    function drawCrosshair(color) {
      ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.setLineDash([5,5]);
      ctx.beginPath();
      ctx.moveTo(CANVAS_WIDTH/2 - 15, CANVAS_HEIGHT/2); ctx.lineTo(CANVAS_WIDTH/2 + 15, CANVAS_HEIGHT/2);
      ctx.moveTo(CANVAS_WIDTH/2, CANVAS_HEIGHT/2 - 15); ctx.lineTo(CANVAS_WIDTH/2, CANVAS_HEIGHT/2 + 15);
      ctx.stroke(); ctx.setLineDash([]);
    }

    function stop() {
      tracking = false; updateStatus('⏹ Остановлено');
      if (vid?.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
      if (mqtt?.isConnected()) mqtt.disconnect();
      ui.btnStart.classList.remove('hidden'); ui.btnStop.classList.add('hidden'); ui.stats.classList.add('hidden');
      ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#666'; ctx.font = '16px monospace'; ctx.textAlign = 'center';
      ctx.fillText('Остановлено', canvas.width/2, canvas.height/2); ctx.textAlign = 'left';
    }

    window.onerror = (msg, url, line) => { log(`💥 ${msg} (L${line})`, 'err'); return false; };
    console.log('🎯 Pan-Tilt Tracker Ready');
  </script>
</body>
</html>
