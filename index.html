<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Detection & Tracking</title>
  <style>
    body { background: #0a0a0a; color: #0f0; font-family: 'Courier New', monospace; margin: 0; padding: 16px; }
    #status { margin: 8px 0; font-size: 14px; }
    #canvas { border: 2px solid #333; background: #000; max-width: 100%; display: block; }
    .controls { margin: 8px 0; }
    button { background: #222; color: #0f0; border: 1px solid #444; padding: 6px 12px; cursor: pointer; }
    button:hover { background: #333; }
    .info { font-size: 12px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>🤖 Auto Detection & Tracking (Browser)</h2>
  <div id="status">⏳ Загрузка модели YOLOv8n...</div>
  <div class="info">FPS: <span id="fps">0</span> | Tracks: <span id="trackCount">0</span></div>
  <canvas id="canvas" width="320" height="240"></canvas>
  
  <div class="controls">
    <button id="btnCam">📷 Использовать камеру ПК</button>
    <button id="btnM5" disabled>📡 Подключить M5Stack (WebSocket)</button>
  </div>

  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.2';
    
    env.allowLocalModels = false;
    env.backends.onnx.wasm.numThreads = 1; // стабильнее на слабых устройствах

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const fpsEl = document.getElementById('fps');
    const trackCountEl = document.getElementById('trackCount');

    // === Трекер (Centroid + Exponential Smoothing) ===
    class SimpleTracker {
      constructor(maxDist = 40, maxMisses = 5) {
        this.tracks = [];
        this.nextId = 1;
        this.maxDist = maxDist;
        this.maxMisses = maxMisses;
      }
      update(detections) {
        const matched = new Array(detections.length).fill(false);
        const alpha = 0.3; // сглаживание

        for (const t of this.tracks) {
          let bestIdx = -1, bestDist = this.maxDist;
          for (let i = 0; i < detections.length; i++) {
            if (matched[i]) continue;
            const d = Math.hypot(detections[i].cx - t.x, detections[i].cy - t.y);
            if (d < bestDist) { bestDist = d; bestIdx = i; }
          }
          if (bestIdx !== -1) {
            matched[bestIdx] = true;
            const d = detections[bestIdx];
            t.x = t.x * (1-alpha) + d.cx * alpha;
            t.y = t.y * (1-alpha) + d.cy * alpha;
            t.w = t.w * (1-alpha) + d.w * alpha;
            t.h = t.h * (1-alpha) + d.h * alpha;
            t.class = d.class;
            t.conf = d.conf;
            t.misses = 0;
          } else {
            t.misses++;
            t.vx = t.vx || 0; t.vy = t.vy || 0;
            t.x += t.vx * 2; t.y += t.vy * 2; // предсказание
          }
        }

        this.tracks = this.tracks.filter(t => t.misses <= this.maxMisses);

        for (let i = 0; i < detections.length; i++) {
          if (!matched[i]) {
            const d = detections[i];
            this.tracks.push({
              id: this.nextId++,
              x: d.cx, y: d.cy, w: d.w, h: d.h,
              vx: 0, vy: 0, misses: 0,
              class: d.class, conf: d.conf
            });
          }
        }
        return this.tracks;
      }
    }

    // === Глобальные переменные ===
    let detector = null;
    let tracker = new SimpleTracker(50, 5);
    let videoStream = null;
    let ws = null;
    let processing = false;
    let lastFrameTime = 0;
    let frameSkip = 0; // обрабатывать 1 из N кадров
    const SKIP_RATE = 3;

    // === Инициализация модели ===
    async function initModel() {
      try {
        // Пробуем WebGPU, если нет → WASM
        detector = await pipeline('object-detection', 'Xenova/yolov8n', { 
          device: 'webgpu', 
          progress_callback: (p) => statusEl.innerText = `⏳ Загрузка: ${Math.round(p*100)}%`
        });
      } catch(e) {
        console.warn('WebGPU не доступен, fallback на WASM');
        detector = await pipeline('object-detection', 'Xenova/yolov8n', { device: 'wasm' });
      }
      statusEl.innerText = '✅ Модель загружена. Нажмите "Использовать камеру ПК"';
      document.getElementById('btnCam').disabled = false;
    }

    // === Обработка кадра ===
    async function processFrame(imageSource) {
      if (!detector || processing) return;
      processing = true;

      frameSkip = (frameSkip + 1) % SKIP_RATE;
      if (frameSkip !== 0) {
        processing = false;
        requestAnimationFrame(() => processFrame(imageSource));
        return;
      }

      const start = performance.now();
      try {
        const results = await detector(imageSource, { threshold: 0.25 });
        const detections = results.map(r => ({
          cx: r.box.x + r.box.width/2,
          cy: r.box.y + r.box.height/2,
          w: r.box.width, h: r.box.height,
          class: r.label, conf: r.score
        }));

        const tracks = tracker.update(detections);
        draw(tracks);
        
        const fps = Math.round(1000 / (performance.now() - lastFrameTime));
        fpsEl.innerText = fps || 0;
        trackCountEl.innerText = tracks.length;
      } catch(err) {
        console.error('Inference error:', err);
      } finally {
        processing = false;
        lastFrameTime = performance.now();
        requestAnimationFrame(() => processFrame(imageSource));
      }
    }

    // === Отрисовка ===
    function draw(tracks) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const colors = ['#0f0','#0ff','#f0f','#ff0','#f00','#a0f'];
      
      for (const t of tracks) {
        const color = colors[t.id % colors.length];
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.strokeRect(t.x - t.w/2, t.y - t.h/2, t.w, t.h);
        
        ctx.fillStyle = color;
        ctx.font = 'bold 12px monospace';
        ctx.fillText(`#${t.id} ${t.class}`, t.x - t.w/2, t.y - t.h/2 - 4);
        ctx.fillText(`conf: ${t.conf.toFixed(2)}`, t.x - t.w/2, t.y - t.h/2 - 18);
      }
    }

    // === Камера ПК ===
    document.getElementById('btnCam').addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: 320, height: 240, facingMode: 'environment' } 
        });
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();
        await new Promise(r => video.onloadedmetadata = r);
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        const loop = () => {
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          processFrame(canvas);
        };
        loop();
        statusEl.innerText = '📷 Камера активна';
      } catch(e) {
        statusEl.innerText = '❌ Ошибка камеры: ' + e.message;
      }
    });

    // === Запуск ===
    initModel();
  </script>
</body>
</html>
