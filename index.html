<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Pan-Tilt AI Tracker</title>
 <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #000; 
    overflow: hidden; 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    touch-action: none;
  }
  #canvas { 
    width: 100vw; 
    height: 100vh; 
    display: block; 
    /* transform: scaleX(-1);  <-- УБРАНО: зеркало теперь через кнопку */
  }
  #ui { 
    position: fixed; 
    top: 10px; 
    left: 10px; 
    right: 10px; 
    background: rgba(0,0,0,0.7); /* Более прозрачный */
    color: #0f0; 
    padding: 10px; 
    border-radius: 10px; 
    z-index: 100; 
    font-size: 13px;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(0,255,0,0.3);
    max-height: 40vh; /* Ограничиваем высоту */
    overflow-y: auto; /* Прокрутка если нужно */
    transition: opacity 0.3s, transform 0.3s;
  }
  #ui.collapsed {
    opacity: 0.3;
    pointer-events: none;
    transform: translateY(-10px);
  }
  #ui.collapsed:hover {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  .row { display: flex; gap: 5px; margin-bottom: 6px; flex-wrap: wrap; }
  .row input { 
    flex: 1; 
    min-width: 100px;
    background: rgba(30,30,30,0.8); 
    color: #0f0; 
    border: 1px solid #444; 
    padding: 6px 8px; 
    border-radius: 5px;
    font-size: 12px;
    outline: none;
  }
  .row input:focus { border-color: #0f0; }
  button { 
    background: #004400; 
    color: #fff; 
    border: none; 
    padding: 8px 12px; 
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    font-size: 13px;
    margin: 2px 0;
  }
  button:active { background: #002200; }
  button.secondary { background: #333; }
  button.danger { background: #550000; }
  #status { 
    margin-top: 6px; 
    font-size: 12px; 
    padding: 5px; 
    background: rgba(0,0,0,0.4);
    border-radius: 4px;
    text-align: center;
  }
  #log { 
    max-height: 80px; 
    overflow-y: auto; 
    font-size: 10px; 
    color: #999; 
    margin-top: 6px; 
    font-family: monospace;
    line-height: 1.3;
  }
  .log-item { margin: 1px 0; }
  .log-err { color: #f55; }
  .log-warn { color: #fa0; }
  .log-ok { color: #8f8; }
  
  /* Панель управления в углу (не перекрывает центр) */
  #controls {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.7);
    padding: 8px;
    border-radius: 8px;
    border: 1px solid rgba(0,255,0,0.3);
    z-index: 90;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  
  #stats {
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: #0f0;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-family: monospace;
    z-index: 90;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <video id="vid" style="display:none" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  
  <!-- Панель управления (справа, не перекрывает центр) -->
  <div id="controls">
    <button onclick="toggleMirror()">🪞 Зеркало: <span id="mirrorState">OFF</span></button>
    <button onclick="toggleUI()">👁 Показать/Скрыть меню</button>
    <button class="secondary" onclick="resetServos()">🔄 Центр серво</button>
  </div>
  
  <!-- Основное меню (слева, сворачивается) -->
  <div id="ui">
    <h3 style="margin-bottom: 8px; color: #0f0; font-size: 14px;">🎯 Pan-Tilt Tracker</h3>
    
    <div class="row">
      <input id="mqttHost" placeholder="Host" value="367d7905056a451cac7755db6f5bcc81.s1.eu.hivemq.cloud">
    </div>
    <div class="row">
      <input id="mqttPort" placeholder="Port" value="8884" type="number" style="max-width: 70px;">
      <input id="mqttUser" placeholder="User" value="">
    </div>
    <div class="row">
      <input id="mqttPass" type="password" placeholder="Pass" value="">
      <input id="mqttTopic" placeholder="Topic" value="servo/control">
    </div>
    
    <button id="btnStart" onclick="init()">🚀 СТАРТ</button>
    <button id="btnStop" class="hidden danger" onclick="stop()">⏹ СТОП</button>
    
    <div id="status">📴 Готов</div>
    <div id="log"></div>
  </div>

  <div id="stats" class="hidden">
    FPS:<span id="fps">0</span> | Obj:<span id="objCount">0</span> | Sent:<span id="sentCount">0</span>
  </div>

  <!-- Библиотеки -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

  <script>
    // ================= ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =================
    let detector, mqtt, vid, ctx, canvas;
    let tracking = false;
    let lastSend = 0;
    let frameCount = 0, lastFpsTime = 0, sentCount = 0;
    let isMirrored = false; // Состояние зеркала
    let uiCollapsed = false;
    
    const SEND_INTERVAL = 100;
    const CONF_THRESHOLD = 0.35;
    const CANVAS_WIDTH = 320;
    const CANVAS_HEIGHT = 240;

    const ui = {
      status: document.getElementById('status'),
      log: document.getElementById('log'),
      btnStart: document.getElementById('btnStart'),
      btnStop: document.getElementById('btnStop'),
      stats: document.getElementById('stats'),
      fps: document.getElementById('fps'),
      objCount: document.getElementById('objCount'),
      sentCount: document.getElementById('sentCount'),
      mirrorState: document.getElementById('mirrorState')
    };

    // ================= ЛОГИРОВАНИЕ =================
    function log(msg, type = 'info') {
      const time = new Date().toLocaleTimeString();
      const cls = type === 'err' ? 'log-err' : type === 'warn' ? 'log-warn' : 'log-ok';
      const div = document.createElement('div');
      div.className = `log-item ${cls}`;
      div.textContent = `[${time}] ${msg}`;
      ui.log.insertBefore(div, ui.log.firstChild);
      while (ui.log.children.length > 15) ui.log.removeChild(ui.log.lastChild);
      console.log(`[${type.toUpperCase()}] ${msg}`);
    }

    function updateStatus(msg) { ui.status.textContent = msg; }

    // ================= НОВЫЕ ФУНКЦИИ УПРАВЛЕНИЯ =================
    
    // Переключение зеркала камеры
    function toggleMirror() {
      isMirrored = !isMirrored;
      canvas.style.transform = isMirrored ? 'scaleX(-1)' : 'scaleX(1)';
      ui.mirrorState.textContent = isMirrored ? 'ON' : 'OFF';
      ui.mirrorState.style.color = isMirrored ? '#0f0' : '#888';
      log(`Зеркало: ${isMirrored ? 'ВКЛ' : 'ВЫКЛ'}`, 'info');
    }

    // Свернуть/развернуть меню
    function toggleUI() {
      const el = document.getElementById('ui');
      uiCollapsed = !uiCollapsed;
      el.classList.toggle('collapsed', uiCollapsed);
      log(`Меню: ${uiCollapsed ? 'скрыто' : 'показано'}`, 'info');
    }

    // Команда возврата серво в центр
    function resetServos() {
      if (mqtt && mqtt.isConnected()) {
        const msg = new Paho.MQTT.Message(JSON.stringify({ ex: 0, ey: 0, conf: 1.0, cmd: 'center' }));
        msg.destinationName = document.getElementById('mqttTopic').value.trim() || 'servo/control';
        mqtt.send(msg);
        log('🔄 Отправлена команда: центр', 'ok');
      } else {
        log('⚠️ MQTT не подключен', 'warn');
      }
    }

    // ================= ИНИЦИАЛИЗАЦИЯ =================
    async function init() {
      try {
        ui.btnStart.classList.add('hidden');
        ui.btnStop.classList.remove('hidden');
        ui.stats.classList.remove('hidden');

        updateStatus('📷 Камера...');
        vid = document.getElementById('vid');
        canvas = document.getElementById('canvas');
        ctx = canvas.getContext('2d');
        
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'environment', width: { ideal: 320 }, height: { ideal: 240 } },
          audio: false
        });
        
        vid.srcObject = stream;
        await new Promise(resolve => { vid.onloadedmetadata = () => { vid.play(); resolve(); }; });
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;
        
        log('✅ Камера OK', 'ok');
        updateStatus('🔌 MQTT...');

        const host = document.getElementById('mqttHost').value.trim();
        const port = parseInt(document.getElementById('mqttPort').value) || 8884;
        const user = document.getElementById('mqttUser').value.trim();
        const pass = document.getElementById('mqttPass').value.trim();
        const topic = document.getElementById('mqttTopic').value.trim() || 'servo/control';
        
        if (!host) throw new Error('Укажите MQTT Host');
        
        const clientId = `web_pt_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        mqtt = new Paho.MQTT.Client(host, port, `/mqtt`, clientId);
        
        mqtt.onConnectionLost = (r) => { log(`🔴 MQTT: ${r.errorMessage}`, 'err'); updateStatus('🔴 Lost'); };
        mqtt.onMessageArrived = (m) => log(`📥 ${m.payloadString.substring(0,30)}`, 'info');
        
        const opts = {
          timeout: 10,
          useSSL: location.protocol === 'https:',
          onSuccess: () => {
            log('✅ MQTT OK', 'ok');
            updateStatus('⏳ AI...');
            mqtt.subscribe(topic);
            loadAI();
          },
          onFailure: (e) => { log(`❌ MQTT: ${e.errorMessage}`, 'err'); ui.btnStart.classList.remove('hidden'); ui.btnStop.classList.add('hidden'); }
        };
        if (user) { opts.userName = user; opts.password = pass; }
        mqtt.connect(opts);
        
      } catch (e) { log(`❌ ${e.message}`, 'err'); updateStatus(`❌ ${e.message}`); ui.btnStart.classList.remove('hidden'); ui.btnStop.classList.add('hidden'); }
    }

    // ================= ЗАГРУЗКА AI =================
    async function loadAI() {
      try {
        updateStatus('⏳ Загрузка AI (10-20 сек)...');
        detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
        log('✅ AI готов!', 'ok');
        updateStatus('🟢 ТРЕКИНГ АКТИВЕН');
        tracking = true;
        lastFpsTime = performance.now();
        loop();
      } catch (e) { log(`❌ AI: ${e.message}`, 'err'); updateStatus('❌ AI Failed'); }
    }

    // ================= ОСНОВНОЙ ЦИКЛ =================
    async function loop() {
      if (!tracking) return;
      requestAnimationFrame(loop);
      frameCount++;
      
      const now = performance.now();
      if (now - lastFpsTime >= 1000) { ui.fps.textContent = frameCount; frameCount = 0; lastFpsTime = now; }
      
      ctx.drawImage(vid, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      
      try {
        const preds = await detector.detect(canvas);
        const valid = preds.filter(p => p.score >= CONF_THRESHOLD);
        ui.objCount.textContent = valid.length;
        
        if (valid.length === 0) { drawCrosshair('#f00'); return; }
        
        const obj = valid[0];
        const [x, y, w, h] = obj.bbox;
        let cx = x + w/2;
        let cy = y + h/2;
        
        // Компенсация зеркала для координат
        if (isMirrored) { cx = CANVAS_WIDTH - cx; }
        
        const ex = cx - CANVAS_WIDTH/2;
        const ey = cy - CANVAS_HEIGHT/2;
        
        // Отрисовка
        ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);
        ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2); ctx.fillStyle = '#0f0'; ctx.fill();
        drawCrosshair('#0f0');
        ctx.fillStyle = '#0f0'; ctx.font = 'bold 11px monospace';
        ctx.fillText(`${obj.class} ${Math.round(obj.score*100)}%`, x, y-8);
        
        // Отправка
        if (now - lastSend >= SEND_INTERVAL && mqtt?.isConnected()) {
          const payload = JSON.stringify({ ex: Math.round(ex), ey: Math.round(ey), conf: parseFloat(obj.score.toFixed(3)), class: obj.class });
          const msg = new Paho.MQTT.Message(payload);
          msg.destinationName = document.getElementById('mqttTopic').value.trim() || 'servo/control';
          mqtt.send(msg);
          sentCount++; ui.sentCount.textContent = sentCount; lastSend = now;
        }
      } catch (e) { console.error(e); }
    }

    function drawCrosshair(color) {
      ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.setLineDash([5,5]);
      ctx.beginPath();
      ctx.moveTo(CANVAS_WIDTH/2 - 15, CANVAS_HEIGHT/2); ctx.lineTo(CANVAS_WIDTH/2 + 15, CANVAS_HEIGHT/2);
      ctx.moveTo(CANVAS_WIDTH/2, CANVAS_HEIGHT/2 - 15); ctx.lineTo(CANVAS_WIDTH/2, CANVAS_HEIGHT/2 + 15);
      ctx.stroke(); ctx.setLineDash([]);
    }

    function stop() {
      tracking = false; updateStatus('⏹ Остановлено');
      if (vid?.srcObject) vid.srcObject.getTracks().forEach(t => t.stop());
      if (mqtt?.isConnected()) mqtt.disconnect();
      ui.btnStart.classList.remove('hidden'); ui.btnStop.classList.add('hidden'); ui.stats.classList.add('hidden');
      ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#666'; ctx.font = '16px monospace'; ctx.textAlign = 'center';
      ctx.fillText('Остановлено', canvas.width/2, canvas.height/2); ctx.textAlign = 'left';
    }

    window.onerror = (msg, url, line) => { log(`💥 ${msg} (L${line})`, 'err'); return false; };
    console.log('🎯 Pan-Tilt Tracker Ready');
  </script>
</body>
</html>
