<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Turret Control</title>
  <style>
    :root { --bg: #0a0a0a; --panel: rgba(15,15,15,0.9); --accent: #2563eb; --accent-hover: #1d4ed8; --warn: #f59e0b; --text: #e5e7eb; --muted: #9ca3af; }
    * { margin:0; padding:0; box-sizing:border-box; touch-action:none; -webkit-tap-highlight-color:transparent; }
    body { background:var(--bg); overflow:hidden; height:100dvh; width:100vw; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--text); user-select:none; }
    
    #feed, #overlay { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; }
    #overlay { z-index:2; pointer-events:none; }
    
    #top-bar { position:fixed; top:0; left:0; right:0; z-index:10; padding:12px 16px; padding-top:max(12px, env(safe-area-inset-top)); background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); display:flex; justify-content:space-between; align-items:center; }
    #status { font-size:13px; color:var(--muted); }
    
    #controls { position:fixed; bottom:0; left:0; right:0; z-index:10; background:var(--panel); padding:16px; padding-bottom:max(16px, env(safe-area-inset-bottom)); border-radius:16px 16px 0 0; backdrop-filter:blur(8px); }
    
    .mode-row { display:flex; gap:10px; margin-bottom:12px; }
    .mode-btn { flex:1; padding:10px; border:none; border-radius:8px; background:#27272a; color:var(--text); font-size:14px; font-weight:500; cursor:pointer; transition:0.2s; }
    .mode-btn.active { background:var(--accent); color:#fff; }
    
    .manual-pad { display:none; grid-template-columns:repeat(3, 1fr); gap:8px; margin:0 auto 12px; max-width:220px; }
    .manual-pad.active { display:grid; }
    .dir-btn { width:60px; height:60px; border:none; border-radius:10px; background:#27272a; color:var(--text); font-size:24px; cursor:pointer; margin:auto; display:flex; align-items:center; justify-content:center; transition:0.1s; }
    .dir-btn:active { background:#3f3f46; transform:scale(0.95); }
    .up { grid-column:2; grid-row:1; } .left { grid-column:1; grid-row:2; } .right { grid-column:3; grid-row:2; } .down { grid-column:2; grid-row:3; }
    
    .slider-group { margin-bottom:10px; }
    .slider-label { font-size:12px; color:var(--muted); margin-bottom:4px; display:flex; justify-content:space-between; }
    .slider-val { color:var(--accent); font-weight:600; }
    input[type=range] { width:100%; height:4px; border-radius:2px; background:#3f3f46; appearance:none; outline:none; }
    input[type=range]::-webkit-slider-thumb { appearance:none; width:16px; height:16px; border-radius:50%; background:var(--accent); cursor:pointer; }
    
    .action-row { display:flex; gap:8px; margin-top:8px; }
    .action-btn { flex:1; padding:10px; border:none; border-radius:6px; background:#27272a; color:var(--text); font-size:13px; cursor:pointer; }
    .action-btn.warn { background:var(--warn); color:#000; font-weight:500; }
    
    #log { height:45px; overflow-y:auto; font-size:11px; background:#18181b; padding:6px; border-radius:6px; margin-top:10px; color:var(--muted); font-family:monospace; }
    
    #start { position:fixed; inset:0; z-index:20; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; padding:32px; text-align:center; }
    #start h1 { font-size:24px; font-weight:600; color:#fff; }
    #start p { color:var(--muted); font-size:14px; max-width:280px; line-height:1.4; }
    #ws-url { width:100%; max-width:260px; padding:12px; border-radius:8px; border:1px solid #3f3f46; background:#18181b; color:#fff; text-align:center; font-size:14px; outline:none; }
    #ws-url:focus { border-color:var(--accent); }
    .start-btn { padding:14px 32px; border:none; border-radius:8px; background:var(--accent); color:#fff; font-size:15px; font-weight:600; cursor:pointer; width:100%; max-width:260px; }
    .start-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .start-btn:hover:not(:disabled) { background:var(--accent-hover); }
    
    .error-msg { color:#ef4444; font-size:13px; min-height:18px; margin-top:4px; }
    .https-warn { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(220,38,38,0.95); color:#fff; padding:16px 20px; border-radius:10px; text-align:center; max-width:85%; display:none; z-index:30; font-size:14px; line-height:1.5; box-shadow:0 10px 25px rgba(0,0,0,0.5); }
    .https-warn button { margin-top:10px; padding:8px 16px; border:none; border-radius:6px; background:#fff; color:#dc2626; font-weight:500; cursor:pointer; }
  </style>
</head>
<body>
  <video id="feed" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>

  <div id="top-bar">
    <h1 style="font-size:18px; font-weight:600;">Turret Control</h1>
    <div id="status">Ожидание</div>
  </div>

  <div id="start">
    <h1>Управление турелью</h1>
    <p>Введите адрес WebSocket вашего контроллера и нажмите кнопку для запуска камеры и подключения.</p>
    <input type="text" id="ws-url" value="ws://192.168.1.100:8765" placeholder="ws://IP:8765">
    <button class="start-btn" id="btn-go">Запустить систему</button>
    <div class="error-msg" id="start-error"></div>
  </div>

  <div id="controls" style="display:none;">
    <div class="mode-row">
      <button class="mode-btn active" id="mode-auto">Авто слежение</button>
      <button class="mode-btn" id="mode-manual">Ручное управление</button>
    </div>

    <div class="manual-pad" id="manual-pad">
      <button class="dir-btn up" data-dir="up">^</button>
      <button class="dir-btn left" data-dir="left">&lt;</button>
      <button class="dir-btn right" data-dir="right">&gt;</button>
      <button class="dir-btn down" data-dir="down">v</button>
    </div>

    <div class="slider-group">
      <div class="slider-label"><span>Скорость движения</span><span class="slider-val" id="speed-val">50%</span></div>
      <input type="range" id="speed" min="10" max="100" value="50">
    </div>

    <div class="slider-group" id="auto-settings">
      <div class="slider-label"><span>Чувствительность слежения</span><span class="slider-val" id="sens-val">0.50</span></div>
      <input type="range" id="sens" min="0.1" max="1.0" step="0.05" value="0.5">
    </div>

    <div class="action-row">
      <button class="action-btn" id="btn-center">Сброс в центр</button>
      <button class="action-btn warn" id="btn-stop">Экстренный стоп</button>
    </div>

    <div id="log"></div>
  </div>

  <div class="https-warn" id="https-warn">
    Камера требует безопасного соединения.<br>
    Откройте сайт по HTTPS или используйте localhost.<br>
    <button onclick="document.getElementById('https-warn').style.display='none'">Понятно</button>
  </div>

  <script>
    const feed = document.getElementById('feed');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d', { alpha:true, desynchronized:true });
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const startScreen = document.getElementById('start');
    const controls = document.getElementById('controls');
    const manualPad = document.getElementById('manual-pad');
    const autoSettings = document.getElementById('auto-settings');
    const btnGo = document.getElementById('btn-go');
    const startError = document.getElementById('start-error');

    let socket = null;
    let detector = null;
    let mode = 'auto';
    let speed = 50;
    let sensitivity = 0.5;
    let smoothX = 0, smoothY = 0;
    let manualTimer = null;
    const SMOOTH = 0.3;

    function log(msg) {
      const d = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.style.margin = '2px 0';
      entry.textContent = `[${d}] ${msg}`;
      logEl.prepend(entry);
      if (logEl.children.length > 50) logEl.lastChild.remove();
    }

    // Проверка HTTPS
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      document.getElementById('https-warn').style.display = 'block';
    }

    // FaceDetector API
    if (window.FaceDetector) {
      detector = new FaceDetector({ fastMode: true, maxDetectedFaces: 1 });
    } else {
      console.warn('FaceDetector не поддерживается этим браузером');
    }

    // WebSocket
    function connectWS(url) {
      if (!url.startsWith('ws://') && !url.startsWith('wss://')) {
        startError.textContent = 'Адрес должен начинаться с ws:// или wss://';
        return;
      }
      if (socket?.readyState === WebSocket.OPEN) return;
      
      socket = new WebSocket(url);
      socket.onopen = () => { 
        statusEl.textContent = 'Подключено'; 
        log('WebSocket соединение установлено'); 
      };
      socket.onclose = () => { 
        statusEl.textContent = 'Отключено'; 
        log('Соединение разорвано. Попытка переподключения...'); 
        setTimeout(()=>connectWS(url), 3000); 
      };
      socket.onerror = () => statusEl.textContent = 'Ошибка сети';
      socket.onmessage = (e) => {
        try { 
          const d = JSON.parse(e.data); 
          if(d.type==='ack') log(`OK: ${d.msg} | Pan: ${d.p}° Tilt: ${d.t}°`); 
        } catch(err) { console.warn('Неверный JSON от ESP32', err); }
      };
    }

    function send(cmd) {
      if (socket?.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify(cmd));
      } else {
        statusEl.textContent = 'Нет соединения';
      }
    }

    // Ручное управление
    function startManual(dir) {
      stopManual();
      const spd = speed / 100;
      send({ type:'manual', dir, speed:spd });
      manualTimer = setInterval(() => send({ type:'manual', dir, speed:spd, hold:true }), 150);
    }
    function stopManual() {
      if (manualTimer) { clearInterval(manualTimer); manualTimer = null; }
      send({ type:'manual', stop:true });
    }

    // Цикл детекции
    async function loop() {
      if (!detector || !feed.videoWidth || mode !== 'auto') { 
        requestAnimationFrame(loop); 
        return; 
      }
      
      if (canvas.width !== feed.videoWidth) { 
        canvas.width = feed.videoWidth; 
        canvas.height = feed.videoHeight; 
      }
      ctx.clearRect(0,0,canvas.width,canvas.height);

      try {
        const faces = await detector.detect(feed);
        if (faces.length) {
          const f = faces[0];
          const cx = f.boundingBox.x + f.boundingBox.width/2;
          const cy = f.boundingBox.y + f.boundingBox.height/2;
          
          let nx = (cx / canvas.width - 0.5) * 2;
          let ny = (cy / canvas.height - 0.5) * 2;
          smoothX = smoothX*(1-SMOOTH) + nx*SMOOTH;
          smoothY = smoothY*(1-SMOOTH) + ny*SMOOTH;

          ctx.strokeStyle = '#10b981'; ctx.lineWidth = 3;
          ctx.strokeRect(f.boundingBox.x-2, f.boundingBox.y-2, f.boundingBox.width+4, f.boundingBox.height+4);
          ctx.fillStyle = '#10b981'; ctx.font = 'bold 14px system-ui';
          ctx.fillText('TARGET', cx-26, cy-10);

          if (Math.abs(smoothX)>0.08 || Math.abs(smoothY)>0.08) {
            send({ type:'track', x:smoothX, y:smoothY, s:sensitivity * (speed/100) });
          }
        } else {
          smoothX = 0; smoothY = 0;
          ctx.fillStyle = 'rgba(255,255,255,0.4)';
          ctx.font = '14px system-ui';
          ctx.fillText('Поиск цели...', canvas.width/2-50, 40);
        }
      } catch(e) { console.warn('Ошибка детекции:', e); }
      requestAnimationFrame(loop);
    }

    // Запуск системы
    btnGo.onclick = async () => {
      const urlInput = document.getElementById('ws-url');
      const url = urlInput.value.trim();
      startError.textContent = '';

      if (!url) {
        startError.textContent = 'Введите адрес WebSocket';
        return;
      }

      btnGo.disabled = true;
      btnGo.textContent = 'Подключение...';

      try {
        // 1. Камера
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        feed.srcObject = stream;

        // 2. WebSocket
        connectWS(url);

        // 3. Переключаем UI
        startScreen.style.display = 'none';
        controls.style.display = 'block';
        log('Система запущена');
        
        if (detector) {
          requestAnimationFrame(loop);
          log('Авто-слежение активно');
        } else {
          log('Авто-слежение недоступно. Используйте ручное управление.');
        }
      } catch (err) {
        console.error(err);
        let msg = err.message;
        if (err.name === 'NotAllowedError') msg = 'Доступ к камере запрещён. Разрешите в настройках браузера.';
        else if (err.name === 'NotFoundError') msg = 'Камера не найдена.';
        else if (err.name === 'NotReadableError') msg = 'Камера занята другим приложением.';
        
        startError.textContent = msg;
        btnGo.disabled = false;
        btnGo.textContent = 'Запустить систему';
      }
    };

    // UI обработчики
    document.getElementById('mode-auto').onclick = function() { 
      mode='auto'; this.classList.add('active'); 
      document.getElementById('mode-manual').classList.remove('active'); 
      manualPad.classList.remove('active'); 
      autoSettings.style.display='block'; 
      stopManual(); 
      log('Режим: Авто'); 
    };
    
    document.getElementById('mode-manual').onclick = function() { 
      mode='manual'; this.classList.add('active'); 
      document.getElementById('mode-auto').classList.remove('active'); 
      manualPad.classList.add('active'); 
      autoSettings.style.display='none'; 
      log('Режим: Ручной'); 
    };
    
    document.getElementById('speed').oninput = function() { 
      speed=+this.value; 
      document.getElementById('speed-val').textContent=speed+'%'; 
    };
    
    document.getElementById('sens').oninput = function() { 
      sensitivity=+this.value; 
      document.getElementById('sens-val').textContent=sensitivity.toFixed(2); 
    };
    
    document.getElementById('btn-center').onclick = () => { send({type:'center'}); log('Команда: Центр'); };
    document.getElementById('btn-stop').onclick = () => { send({type:'stop'}); stopManual(); log('Команда: Стоп'); };

    // Кнопки направления
    document.querySelectorAll('.dir-btn').forEach(btn => {
      const dir = btn.dataset.dir;
      const start = e => { e.preventDefault(); startManual(dir); };
      const end = e => { e.preventDefault(); stopManual(); };
      btn.addEventListener('touchstart', start); 
      btn.addEventListener('mousedown', start);
      btn.addEventListener('touchend', end); 
      btn.addEventListener('mouseup', end); 
      btn.addEventListener('mouseleave', end);
    });
  </script>
</body>
</html>
