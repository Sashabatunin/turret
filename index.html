<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
let detector, mqtt, vid, ctx, canvas;
let tracking = false, lastSend = 0;
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');

function log(msg, type='info') {
  const color = type==='err' ? '#f55' : type==='warn' ? '#fa0' : '#8f8';
  logEl.innerHTML = `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>` + logEl.innerHTML;
}

window.init = async () => {
  try {
    log("1️⃣ Камера...");
    vid = document.getElementById('vid');
    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 320, height: 240 } });
    vid.srcObject = stream; await vid.play();
    canvas.width = 320; canvas.height = 240;
    log("✅ Камера OK");

    const host = document.getElementById('host').value.trim();
    const user = document.getElementById('user').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if (!host || !user) throw new Error("Заполните MQTT Host и Username!");

    log(`2️⃣ MQTT: ${host}:8884`);
    mqtt = new Paho.MQTT.Client(host, 8884, "/mqtt", `web_pt_${Date.now()}`);
    mqtt.onConnectionLost = (r) => { log("🔴 MQTT Lost", 'err'); statusEl.innerText="🔴 MQTT Lost"; };
    mqtt.connect({ userName: user, password: pass, useSSL: true, timeout: 10,
      onSuccess: () => { log("✅ MQTT OK"); loadAI(); },
      onFailure: (e) => { log(`❌ MQTT: ${e.errorMessage}`, 'err'); statusEl.innerText="❌ MQTT Failed"; }
    });
  } catch(e) { log(`❌ ${e.message}`, 'err'); }
};

async function loadAI() {
  try {
    log("3️⃣ Загрузка COCO-SSD (оптимизировано для мобильных)...");
    statusEl.innerText = "⏳ Загружаю AI...";
    detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
    log("✅ AI готов!");
    statusEl.innerText = "🟢 Трекинг запущен!";
    tracking = true; loop();
  } catch(e) { log(`❌ AI: ${e.message}`, 'err'); }
}

async function loop() {
  if (!tracking) return;
  requestAnimationFrame(loop);
  ctx.drawImage(vid, 0, 0, 320, 240);
  
  try {
    const preds = await detector.detect(canvas);
    if (preds.length === 0) return;

    // Берем первый объект с уверенностью > 35%
    const obj = preds.find(p => p.score > 0.35) || preds[0];
    if (obj.score < 0.35) return;

    const cx = obj.bbox[0] + obj.bbox[2]/2;
    const cy = obj.bbox[1] + obj.bbox[3]/2;
    const ex = cx - 160;
    const ey = cy - 120;

    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2;
    ctx.strokeRect(obj.bbox[0], obj.bbox[1], obj.bbox[2], obj.bbox[3]);
    ctx.fillStyle = '#0f0'; ctx.font = '12px monospace';
    ctx.fillText(`${obj.class} ${Math.round(obj.score*100)}%`, obj.bbox[0], obj.bbox[1]-5);

    const now = Date.now();
    if (now - lastSend > 100 && mqtt.isConnected()) {
      mqtt.send(new Paho.MQTT.Message(JSON.stringify({ ex, ey, conf: obj.score })).destinationName="servo/control");
      lastSend = now;
    }
  } catch(e) { console.error("Detect err:", e); }
}
</script>
