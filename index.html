<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Камера</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            color: #eee;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 1.8rem;
            color: #e94560;
        }

        .video-container {
            width: 100%;
            max-width: 800px;
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        video {
            width: 100%;
            display: block;
            border-radius: 12px;
            background: #000;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            color: #fff;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-start { background: #0f3460; }
        .btn-start:hover { background: #1a5276; }

        .btn-stop { background: #e94560; }
        .btn-stop:hover { background: #c0392b; }

        .btn-switch { background: #e67e22; }
        .btn-switch:hover { background: #f39c12; }

        .status {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .status.active { background: #1a8a5c; }
        .status.inactive { background: #e94560; }
    </style>
</head>
<body>

    <h1>📷 Камера</h1>

    <div class="video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="status" class="status inactive">Камера не активна</div>

    <div class="controls">
        <button class="btn-start" onclick="startCamera()">▶ Старт</button>
        <button class="btn-stop" onclick="stopCamera()">⏹ Стоп</button>
        <button class="btn-switch" onclick="switchCamera()">🔃 Переключить камеру</button>
    </div>

    <script>
        let stream = null;
        let facingMode = 'user'; // 'user' = фронтальная, 'environment' = задняя

        const video = document.getElementById('video');
        const status = document.getElementById('status');

        async function startCamera() {
            try {
                stopCamera(); // Останавливаем предыдущий поток, если есть

                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });

                video.srcObject = stream;
                status.textContent = '✅ Камера активна';
                status.className = 'status active';

            } catch (err) {
                console.error('Ошибка доступа к камере:', err);
                status.textContent = '❌ Ошибка: ' + err.message;
                status.className = 'status inactive';
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            video.srcObject = null;
            status.textContent = 'Камера не активна';
            status.className = 'status inactive';
        }

        async function switchCamera() {
            facingMode = facingMode === 'user' ? 'environment' : 'user';
            if (stream) {
                await startCamera();
            } else {
                status.textContent = '🔄 Режим камеры изменён на: ' + (facingMode === 'user' ? 'фронтальную' : 'заднюю');
            }
        }
    </script>

</body>
</html>
